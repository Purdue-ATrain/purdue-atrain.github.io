<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Compare models · Purdue-ATrain skill-bench</title>
<meta name="description" content="Pick up to three models from the Purdue-ATrain skill-bench and compare them side by side: overall composite score, per-tier pass rate and rubric, cost, wall time, and best/worst skills." />
<meta name="theme-color" content="#0F172A" />
<link rel="icon" type="image/png" href="../assets/logo.png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,300;1,400;1,500&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg: #0F172A;
    --surface: #1E293B;
    --primary: #3FA9F5;
    --accent: #7C3AED;
    --accent2: #A855F7;
    --amber: #F59E0B;
    --amber2: #FBBF24;
    --cyan: #22D3EE;
    --green: #10B981;
    --red: #EF4444;
    --text: #E2E8F0;
    --dim: #94A3B8;
    --faint: #64748B;
    --border: rgba(63, 169, 245, 0.15);
  }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: Inter, system-ui, sans-serif;
    margin: 0;
    min-height: 100vh;
  }
  .hl { font-family: "Bricolage Grotesque", system-ui, sans-serif; letter-spacing: -0.02em; line-height: 1.05; }
  .serif-italic { font-family: "Cormorant Garamond", Georgia, serif; font-style: italic; }
  .mono { font-family: "JetBrains Mono", ui-monospace, monospace; }
  a { color: var(--cyan); text-decoration: none; }
  a:hover { color: var(--amber2); }

  .grid-bg {
    background-image:
      linear-gradient(rgba(63,169,245,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(63,169,245,.04) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  /* Nav */
  .topnav {
    height: 56px;
    border-bottom: 1px solid var(--border);
    background: rgba(15,23,42,.85);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 40;
  }
  .topnav-inner {
    max-width: 1280px;
    margin: 0 auto;
    height: 100%;
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }
  .topnav-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text);
  }
  .topnav-brand img { width: 28px; height: 28px; border-radius: 6px; }
  .topnav-links {
    display: flex;
    gap: 20px;
    font-family: "JetBrains Mono", monospace;
    font-size: 12px;
    color: var(--dim);
  }
  .topnav-links a { color: var(--dim); }
  .topnav-links a:hover { color: var(--primary); }

  /* Hero */
  .hero {
    max-width: 1280px;
    margin: 0 auto;
    padding: 56px 24px 24px;
  }
  .hero h1 { font-size: 56px; font-weight: 600; margin: 8px 0 16px; }
  .hero p.sub { font-size: 22px; color: var(--dim); margin: 0 0 12px; max-width: 720px; }
  .hero p.faint { font-size: 13px; color: var(--faint); font-family: "JetBrains Mono", monospace; }
  .hero-label { font-family: "JetBrains Mono", monospace; font-size: 12px; letter-spacing: 0.15em; color: var(--amber); text-transform: uppercase; }

  /* Slot grid */
  .slots {
    max-width: 1280px;
    margin: 32px auto 0;
    padding: 0 24px 56px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
  }
  @media (max-width: 960px) {
    .slots { grid-template-columns: 1fr; }
    .hero h1 { font-size: 40px; }
    .hero p.sub { font-size: 18px; }
  }

  .slot {
    background: rgba(30, 41, 59, 0.5);
    border: 1px solid var(--border);
    border-radius: 12px;
    min-height: 540px;
    padding: 18px;
    transition: border-color .2s, transform .2s, box-shadow .2s;
    position: relative;
  }
  .slot.empty {
    border-style: dashed;
    border-color: rgba(34, 211, 238, .35);
    background: rgba(34, 211, 238, 0.03);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  .slot.empty:hover {
    border-color: var(--cyan);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(34, 211, 238, 0.12);
  }
  .slot.empty .plus {
    font-size: 64px;
    color: rgba(34, 211, 238, .5);
    line-height: 1;
    font-weight: 200;
  }
  .slot.empty .plus-label {
    margin-top: 16px;
    font-family: "JetBrains Mono", monospace;
    font-size: 13px;
    color: var(--dim);
  }
  .slot.filled .header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 14px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .slot.filled .model-name {
    font-family: "Bricolage Grotesque", system-ui, sans-serif;
    font-size: 24px;
    color: var(--primary);
    cursor: pointer;
    letter-spacing: -0.02em;
  }
  .slot.filled .model-name:hover { color: var(--amber2); }
  .slot.filled .slot-close {
    background: transparent;
    border: 1px solid rgba(63,169,245,.2);
    color: var(--dim);
    border-radius: 4px;
    padding: 2px 7px;
    cursor: pointer;
    font-size: 12px;
    transition: background .15s, color .15s, border-color .15s;
  }
  .slot.filled .slot-close:hover {
    background: rgba(239, 68, 68, 0.1);
    color: var(--red);
    border-color: var(--red);
  }
  .ext-badge {
    display: inline-block;
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 99px;
    background: rgba(245, 158, 11, 0.1);
    color: var(--amber);
    border: 1px solid rgba(245, 158, 11, 0.3);
    margin-left: 8px;
  }
  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .stat {
    background: rgba(15, 23, 42, 0.4);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
  }
  .stat-label {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    color: var(--faint);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .stat-value {
    font-family: "Bricolage Grotesque", system-ui, sans-serif;
    font-size: 22px;
    color: var(--text);
    margin-top: 4px;
    letter-spacing: -0.02em;
  }
  .stat-value.amber { color: var(--amber2); }
  .stat-value.green { color: var(--green); }
  .stat-value.cyan  { color: var(--cyan); }

  .tier-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 6px 0;
    border-bottom: 1px solid rgba(63,169,245,.06);
    font-family: "JetBrains Mono", monospace;
    font-size: 12px;
  }
  .tier-row:last-child { border-bottom: 0; }
  .tier-row .tier-name { color: var(--dim); }
  .tier-row .tier-stat { color: var(--text); }
  .tier-row .tier-stat .tier-cost { color: var(--faint); margin-left: 8px; }

  .skills-block {
    margin-top: 14px;
  }
  .skills-block h4 {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--faint);
    margin: 0 0 6px;
  }
  .skill-line {
    font-family: "JetBrains Mono", monospace;
    font-size: 11.5px;
    display: flex;
    justify-content: space-between;
    padding: 3px 0;
  }
  .skill-name { color: var(--dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .skill-score { color: var(--amber2); flex-shrink: 0; margin-left: 8px; }
  .skill-score.bad { color: var(--red); }

  /* Picker modal */
  .picker-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    z-index: 50;
    display: none;
    align-items: flex-start;
    justify-content: center;
    padding-top: 80px;
  }
  .picker-backdrop.open { display: flex; }
  .picker {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 100%;
    max-width: 540px;
    max-height: 70vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 24px 64px rgba(0,0,0,0.5);
  }
  .picker-head {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .picker-head input {
    flex: 1;
    background: rgba(15,23,42,0.5);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 8px 12px;
    font-family: "JetBrains Mono", monospace;
    font-size: 13px;
  }
  .picker-head input:focus {
    outline: none;
    border-color: var(--cyan);
  }
  .picker-head .picker-close {
    background: transparent;
    border: 0;
    color: var(--dim);
    cursor: pointer;
    font-size: 22px;
    line-height: 1;
    padding: 0 4px;
  }
  .picker-head .picker-close:hover { color: var(--red); }
  .picker-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .picker-item {
    padding: 12px 14px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    border: 1px solid transparent;
    margin-bottom: 4px;
    transition: background .12s, border-color .12s;
  }
  .picker-item:hover {
    background: rgba(63,169,245,0.08);
    border-color: var(--border);
  }
  .picker-item.disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .picker-item.disabled:hover { background: transparent; border-color: transparent; }
  .picker-item .pi-name {
    font-family: "JetBrains Mono", monospace;
    font-size: 13px;
    color: var(--text);
  }
  .picker-item .pi-stats {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    color: var(--dim);
  }
  .picker-item .pi-stats .pi-score { color: var(--amber2); }
  .picker-empty {
    padding: 28px 20px;
    color: var(--faint);
    text-align: center;
    font-family: "JetBrains Mono", monospace;
    font-size: 12px;
  }

  /* Loading */
  .loading {
    max-width: 1280px;
    margin: 60px auto;
    padding: 0 24px;
    text-align: center;
    color: var(--dim);
    font-family: "JetBrains Mono", monospace;
    font-size: 13px;
  }
  .loading.err { color: var(--red); }

  footer {
    border-top: 1px solid var(--border);
    padding: 32px 24px;
    margin-top: 80px;
  }
  footer .footer-inner {
    max-width: 1280px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: center;
    text-align: center;
  }
  footer .mono-row {
    display: flex;
    gap: 20px;
    font-family: "JetBrains Mono", monospace;
    font-size: 12px;
    color: var(--faint);
  }
  footer .mono-row a { color: var(--faint); }
  footer .mono-row a:hover { color: var(--text); }
  @media (min-width: 760px) {
    footer .footer-inner { flex-direction: row; justify-content: space-between; }
  }
</style>
</head>

<body class="grid-bg">

<nav class="topnav">
  <div class="topnav-inner">
    <a href="../" class="topnav-brand">
      <img src="../assets/logo.png" alt="" />
      <span class="hl" style="font-size: 16px;">Purdue-ATrain</span>
    </a>
    <div class="topnav-links">
      <a href="../">home</a>
      <a href="../benchmarks/report.html">full report</a>
      <a href="https://github.com/Purdue-ATrain/atrain-skill-bench">github</a>
    </div>
  </div>
</nav>

<section class="hero">
  <div class="hero-label">// compare</div>
  <h1 class="hl">Compare models</h1>
  <p class="sub serif-italic">Pick up to three models from the tested list. Put them side by side.</p>
  <p class="faint">Data from skill-bench &middot; <span id="meta-source">loading...</span></p>
</section>

<div id="slots" class="slots" hidden>
  <div class="slot empty" data-slot="0">
    <div class="plus">+</div>
    <div class="plus-label">Add a model</div>
  </div>
  <div class="slot empty" data-slot="1">
    <div class="plus">+</div>
    <div class="plus-label">Add a model</div>
  </div>
  <div class="slot empty" data-slot="2">
    <div class="plus">+</div>
    <div class="plus-label">Add a model</div>
  </div>
</div>

<div id="loading" class="loading">Loading model data...</div>

<!-- Picker modal -->
<div id="picker-backdrop" class="picker-backdrop" role="dialog" aria-modal="true" aria-labelledby="picker-label">
  <div class="picker">
    <div class="picker-head">
      <input id="picker-search" type="search" placeholder="Search by model name..." autocomplete="off" aria-label="Search models" />
      <button class="picker-close" id="picker-close" aria-label="Close picker">&times;</button>
    </div>
    <div class="picker-list" id="picker-list"></div>
  </div>
</div>

<footer>
  <div class="footer-inner">
    <span class="mono" style="color: var(--dim); font-size: 12px;">purdue-atrain &middot; compare</span>
    <div class="mono-row">
      <a href="../">/home</a>
      <a href="../benchmarks/report.html">/full-report</a>
      <a href="https://github.com/Purdue-ATrain">/github</a>
      <span>MIT.license</span>
    </div>
  </div>
</footer>

<script>
(function () {
  var state = { data: null, slots: [null, null, null], activeSlot: null };

  function fmt2(n) { return (Math.round(n * 100) / 100).toFixed(2); }
  function fmtScore(n) { return n == null ? '·' : fmt2(n); }
  function fmtPct(n) { return n == null ? '·' : Math.round(n * 100) + '%'; }
  function fmtCost(n) { return n == null ? '·' : '$' + (Math.round(n * 100) / 100).toFixed(2); }
  function fmtWall(s) { return s == null ? '·' : (s >= 60 ? (s / 60).toFixed(1) + 'm' : Math.round(s) + 's'); }

  async function loadData() {
    var loading = document.getElementById('loading');
    try {
      var res = await fetch('data.json', { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      state.data = await res.json();
    } catch (err) {
      loading.classList.add('err');
      loading.textContent = 'Failed to load data.json: ' + err.message;
      return;
    }
    loading.hidden = true;
    document.getElementById('slots').hidden = false;
    var meta = state.data.generated_from || 'unknown';
    document.getElementById('meta-source').textContent = state.data.models.length + ' models · 24 tests · source: ' + meta;
    bindSlots();
    applyURLState();
  }

  function bindSlots() {
    document.querySelectorAll('.slot').forEach(function (el) {
      el.addEventListener('click', function (e) {
        if (el.classList.contains('empty')) {
          openPicker(parseInt(el.dataset.slot, 10));
        } else if (e.target && e.target.classList.contains('model-name')) {
          openPicker(parseInt(el.dataset.slot, 10));
        }
      });
    });
  }

  function openPicker(slotIdx) {
    state.activeSlot = slotIdx;
    var backdrop = document.getElementById('picker-backdrop');
    var search = document.getElementById('picker-search');
    backdrop.classList.add('open');
    search.value = '';
    renderPickerList('');
    setTimeout(function () { search.focus(); }, 50);
  }

  function closePicker() {
    document.getElementById('picker-backdrop').classList.remove('open');
    state.activeSlot = null;
  }

  function renderPickerList(query) {
    var list = document.getElementById('picker-list');
    var q = query.trim().toLowerCase();
    var cards = state.data.model_cards || {};
    var ordered = (state.data.models || []).slice().sort(function (a, b) {
      var sa = (cards[a] || {}).overall_score || 0;
      var sb = (cards[b] || {}).overall_score || 0;
      return sb - sa;
    });

    var matches = ordered.filter(function (m) { return !q || m.toLowerCase().includes(q); });
    if (!matches.length) {
      list.innerHTML = '<div class="picker-empty">No models match.</div>';
      return;
    }

    var alreadySelected = new Set(state.slots.filter(function (s) { return s; }));

    list.innerHTML = matches.map(function (m) {
      var c = cards[m] || {};
      var disabled = alreadySelected.has(m);
      var ext = c.external ? '<span class="ext-badge">external baseline</span>' : '';
      return '<div class="picker-item' + (disabled ? ' disabled' : '') + '" data-model="' + escapeHtml(m) + '">' +
        '<div><span class="pi-name">' + escapeHtml(m) + '</span>' + ext + '</div>' +
        '<div class="pi-stats"><span class="pi-score">' + fmtScore(c.overall_score) + '</span> &middot; ' +
        fmtCost(c.total_cost) + ' &middot; ' + fmtWall(c.median_wall) + '</div>' +
        '</div>';
    }).join('');

    list.querySelectorAll('.picker-item').forEach(function (el) {
      if (el.classList.contains('disabled')) return;
      el.addEventListener('click', function () {
        selectModel(el.dataset.model);
      });
    });
  }

  function selectModel(modelName) {
    if (state.activeSlot == null) return;
    state.slots[state.activeSlot] = modelName;
    renderSlot(state.activeSlot);
    closePicker();
    updateURL();
  }

  function clearSlot(slotIdx) {
    state.slots[slotIdx] = null;
    var el = document.querySelector('[data-slot="' + slotIdx + '"]');
    el.className = 'slot empty';
    el.dataset.slot = slotIdx;
    el.innerHTML = '<div class="plus">+</div><div class="plus-label">Add a model</div>';
    updateURL();
  }

  function renderSlot(slotIdx) {
    var modelName = state.slots[slotIdx];
    var el = document.querySelector('[data-slot="' + slotIdx + '"]');
    if (!modelName) {
      clearSlot(slotIdx);
      return;
    }
    var c = (state.data.model_cards || {})[modelName] || {};
    var tiers = c.tier_summary || {};
    var top = (c.top_skills || []).slice(0, 4);
    var bot = (c.bot_skills || []).slice(0, 4);
    var ext = c.external ? '<span class="ext-badge">external baseline</span>' : '';

    el.className = 'slot filled';
    el.innerHTML =
      '<div class="header">' +
        '<div><span class="model-name">' + escapeHtml(modelName) + '</span>' + ext + '</div>' +
        '<button class="slot-close" aria-label="Remove">remove</button>' +
      '</div>' +
      '<div class="stat-grid">' +
        '<div class="stat"><div class="stat-label">overall</div><div class="stat-value amber">' + fmtScore(c.overall_score) + '</div></div>' +
        '<div class="stat"><div class="stat-label">cells</div><div class="stat-value">' + (c.n_cells || 0) + '</div></div>' +
        '<div class="stat"><div class="stat-label">total cost</div><div class="stat-value green">' + fmtCost(c.total_cost) + '</div></div>' +
        '<div class="stat"><div class="stat-label">median wall</div><div class="stat-value cyan">' + fmtWall(c.median_wall) + '</div></div>' +
      '</div>' +
      '<div>' +
        renderTier('micro', tiers.micro) +
        renderTier('mid', tiers.mid) +
        renderTier('complex', tiers.complex) +
      '</div>' +
      (top.length ? '<div class="skills-block"><h4>top skills</h4>' +
        top.map(function (s) { return '<div class="skill-line"><span class="skill-name">' + escapeHtml(s.skill) + '</span><span class="skill-score">' + fmtScore(s.score) + '</span></div>'; }).join('') +
        '</div>' : '') +
      (bot.length ? '<div class="skills-block"><h4>weakest skills</h4>' +
        bot.map(function (s) { return '<div class="skill-line"><span class="skill-name">' + escapeHtml(s.skill) + '</span><span class="skill-score bad">' + fmtScore(s.score) + '</span></div>'; }).join('') +
        '</div>' : '');

    el.querySelector('.slot-close').addEventListener('click', function (e) {
      e.stopPropagation();
      clearSlot(slotIdx);
    });
    el.querySelector('.model-name').addEventListener('click', function (e) {
      e.stopPropagation();
      openPicker(slotIdx);
    });
  }

  function renderTier(name, t) {
    if (!t) {
      return '<div class="tier-row"><span class="tier-name">' + name + '</span><span class="tier-stat" style="color: var(--faint);">no cells</span></div>';
    }
    var pr = (t.pass_rate != null) ? Math.round(t.pass_rate * 100) + '%' : '·';
    var rb = (t.mean_score != null) ? fmt2(t.mean_score) : '·';
    var cost = (t.mean_cost != null) ? fmtCost(t.mean_cost) : '·';
    return '<div class="tier-row"><span class="tier-name">' + name +
      ' <span style="color: var(--faint);">(' + (t.n || 0) + ' cells)</span></span>' +
      '<span class="tier-stat">' + pr + ' pass &middot; ' + rb + ' rubric <span class="tier-cost">' + cost + '</span></span></div>';
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  // Picker close handlers
  document.getElementById('picker-close').addEventListener('click', closePicker);
  document.getElementById('picker-backdrop').addEventListener('click', function (e) {
    if (e.target === e.currentTarget) closePicker();
  });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') closePicker();
  });
  document.getElementById('picker-search').addEventListener('input', function (e) {
    renderPickerList(e.target.value);
  });

  // URL state for shareable comparisons: ?m=opus46,sonnet45
  function updateURL() {
    var picked = state.slots.filter(function (s) { return s; });
    var url = new URL(window.location.href);
    if (picked.length) url.searchParams.set('m', picked.join(','));
    else url.searchParams.delete('m');
    history.replaceState(null, '', url.toString());
  }
  function applyURLState() {
    var params = new URLSearchParams(window.location.search);
    var m = params.get('m');
    if (!m) return;
    var picks = m.split(',').slice(0, 3);
    var cards = state.data.model_cards || {};
    picks.forEach(function (name, i) {
      if (cards[name]) {
        state.slots[i] = name;
        renderSlot(i);
      }
    });
  }

  loadData();
})();
</script>
